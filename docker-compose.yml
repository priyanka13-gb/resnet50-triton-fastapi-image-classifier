services:
  triton:
    image: nvcr.io/nvidia/tritonserver:23.10-py3
    container_name: triton_server
    volumes:
      - ./triton_models:/models
    command: >
      tritonserver
      --model-repository=/models
      --strict-model-config=false
      --log-verbose=1
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    shm_size: '256m'
    ulimits:
      memlock: -1
      stack: 67108864

  fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile.fastapi
    container_name: fastapi_app
    depends_on:
      triton:
        condition: service_healthy
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./scripts:/app/scripts
    restart: on-failure
