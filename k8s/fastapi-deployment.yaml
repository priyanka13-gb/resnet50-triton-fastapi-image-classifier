apiVersion: apps/v1
kind: Deployment
metadata:
  name: upjao-fastapi
  labels:
    app: upjao-fastapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: upjao-fastapi
  template:
    metadata:
      labels:
        app: upjao-fastapi
    spec:
      containers:
      - name: fastapi
        image: upjao/fastapi:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: TRITON_HOST
          value: upjao-triton
        - name: TRITON_HTTP_PORT
          value: "8000"
        - name: TRITON_GRPC_PORT
          value: "8001"
        - name: MODEL_NAME
          value: resnet50
        - name: MODEL_VERSION
          value: "1"
        - name: INPUT_SIZE
          value: "224"
        - name: MAX_BATCH_SIZE
          value: "8"
        - name: LOG_LEVEL
          value: INFO
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: upjao-fastapi
spec:
  selector:
    app: upjao-fastapi
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
